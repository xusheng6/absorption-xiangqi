<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>功能棋 - 在线对战</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>功能棋</h1>
            <p class="subtitle">吸收象棋变体</p>
        </header>

        <!-- Lobby Screen -->
        <div id="lobby" class="screen">
            <div class="lobby-content">
                <h2>欢迎来到功能棋</h2>
                <p class="rule-hint">
                    规则：吃掉对方棋子后，获得该棋子的走法能力！
                </p>

                <div class="lobby-buttons">
                    <button id="playAIBtn" class="btn btn-primary">人机对战</button>
                    <button id="createRoomBtn" class="btn btn-secondary">创建房间</button>
                    <button id="matchmakingBtn" class="btn btn-secondary">随机匹配</button>
                </div>

                <div class="join-room">
                    <h3>加入房间</h3>
                    <div class="join-input">
                        <input type="text" id="roomCodeInput" placeholder="输入房间代码" maxlength="4">
                        <button id="joinRoomBtn" class="btn">加入</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Waiting Screen -->
        <div id="waiting" class="screen hidden">
            <div class="waiting-content">
                <div id="waitingMessage">等待中...</div>
                <div id="roomCodeDisplay" class="room-code"></div>
                <div id="shareLink" class="share-link hidden">
                    <p>分享链接邀请好友：</p>
                    <div class="share-link-box">
                        <input type="text" id="shareLinkInput" readonly>
                        <button id="copyLinkBtn" class="btn btn-secondary">复制</button>
                    </div>
                </div>
                <button id="cancelBtn" class="btn btn-danger">取消</button>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="game" class="screen hidden">
            <!-- Game Over Banner (non-blocking, above the board) -->
            <div id="gameOverBanner" class="game-over-banner hidden">
                <div class="game-over-banner-content">
                    <span id="gameOverTitle" class="game-over-title">游戏结束</span>
                    <span id="gameOverMessage" class="game-over-message"></span>
                    <div class="game-over-buttons">
                        <button id="rematchBtn" class="btn btn-primary btn-sm">再来一局</button>
                        <button id="shareGameBtn" class="btn btn-secondary btn-sm" style="display: none;">分享棋局</button>
                        <button id="backToLobbyBtn" class="btn btn-sm">返回大厅</button>
                    </div>
                    <span id="rematchStatus" class="rematch-status"></span>
                </div>
            </div>

            <div class="game-header">
                <div class="player-info" id="blackInfo">
                    <span class="player-label">黑方</span>
                    <span class="turn-indicator" id="blackTurn"></span>
                </div>
                <div class="game-status" id="gameStatus"></div>
                <div class="player-info" id="redInfo">
                    <span class="player-label">红方</span>
                    <span class="turn-indicator" id="redTurn"></span>
                </div>
            </div>

            <div class="board-container">
                <canvas id="boardCanvas" width="540" height="600"></canvas>
            </div>

            <div class="piece-info" id="pieceInfo">
                <div class="piece-info-content">
                    <span id="selectedPieceType"></span>
                    <span id="selectedPieceAbilities"></span>
                </div>
            </div>

            <div class="fen-display" id="fenDisplay">
                <input type="text" id="fenString" readonly>
                <button id="copyFenBtn" class="btn btn-sm">复制</button>
            </div>

            <div class="game-controls">
                <button id="drawBtn" class="btn btn-secondary">求和</button>
                <button id="takebackBtn" class="btn btn-secondary" style="display: none;">悔棋</button>
                <button id="resignBtn" class="btn btn-danger">认输</button>
            </div>

            <!-- Draw Offer Modal -->
            <div id="drawOfferModal" class="modal hidden">
                <div class="modal-content">
                    <h2>和棋请求</h2>
                    <p>对手请求和棋，是否同意？</p>
                    <div class="modal-buttons">
                        <button id="acceptDrawBtn" class="btn btn-primary">同意</button>
                        <button id="declineDrawBtn" class="btn btn-danger">拒绝</button>
                    </div>
                </div>
            </div>

        </div>

        <!-- Position Editor Screen -->
        <div id="editor" class="screen hidden">
            <div class="editor-layout">
                <div class="editor-board-area">
                    <canvas id="editorCanvas" width="540" height="630"></canvas>
                </div>
                <div class="editor-panel">
                    <h2 class="editor-title">编辑局面</h2>

                    <div class="editor-section">
                        <p class="editor-label">红方棋子</p>
                        <div class="palette-row">
                            <button class="palette-piece red" data-type="general" data-color="red">帥</button>
                            <button class="palette-piece red" data-type="advisor" data-color="red">仕</button>
                            <button class="palette-piece red" data-type="elephant" data-color="red">相</button>
                            <button class="palette-piece red" data-type="horse" data-color="red">傌</button>
                            <button class="palette-piece red" data-type="chariot" data-color="red">俥</button>
                            <button class="palette-piece red" data-type="cannon" data-color="red">炮</button>
                            <button class="palette-piece red" data-type="soldier" data-color="red">兵</button>
                        </div>
                        <p class="editor-label">黑方棋子</p>
                        <div class="palette-row">
                            <button class="palette-piece black" data-type="general" data-color="black">將</button>
                            <button class="palette-piece black" data-type="advisor" data-color="black">士</button>
                            <button class="palette-piece black" data-type="elephant" data-color="black">象</button>
                            <button class="palette-piece black" data-type="horse" data-color="black">馬</button>
                            <button class="palette-piece black" data-type="chariot" data-color="black">車</button>
                            <button class="palette-piece black" data-type="cannon" data-color="black">砲</button>
                            <button class="palette-piece black" data-type="soldier" data-color="black">卒</button>
                        </div>
                        <div class="palette-row">
                            <button class="palette-piece eraser selected" data-type="eraser">✕</button>
                        </div>
                    </div>

                    <div class="editor-section" id="abilitySection" style="display:none">
                        <p class="editor-label">额外能力 (<span id="abilityPieceName"></span>)</p>
                        <div class="ability-checkboxes" id="abilityCheckboxes">
                            <label><input type="checkbox" data-ability="chariot"> 車</label>
                            <label><input type="checkbox" data-ability="horse"> 馬</label>
                            <label><input type="checkbox" data-ability="elephant"> 象</label>
                            <label><input type="checkbox" data-ability="advisor"> 士</label>
                            <label><input type="checkbox" data-ability="cannon"> 炮</label>
                            <label><input type="checkbox" data-ability="soldier"> 兵</label>
                        </div>
                    </div>

                    <div class="editor-section">
                        <p class="editor-label">设置</p>
                        <div class="editor-settings">
                            <label>先手 <select id="editorSideToMove">
                                <option value="red">红方</option>
                                <option value="black">黑方</option>
                            </select></label>
                            <label>玩家 <select id="editorPlayerColor">
                                <option value="red">红方</option>
                                <option value="black">黑方</option>
                            </select></label>
                        </div>
                    </div>

                    <div class="editor-section">
                        <p class="editor-label">难度</p>
                        <select id="editorDifficulty">
                            <option value="pikafish_easy">Pikafish 简单 (深度 8)</option>
                            <option value="pikafish_medium" selected>Pikafish 中等 (深度 12)</option>
                            <option value="pikafish_hard">Pikafish 困难 (深度 16)</option>
                            <option value="pikafish_extreme">Pikafish 极限 (深度 20)</option>
                            <option value="easy">JS AI 简单 (深度 4)</option>
                            <option value="medium">JS AI 中等 (深度 5)</option>
                            <option value="hard">JS AI 困难 (深度 6)</option>
                        </select>
                    </div>

                    <div class="editor-actions">
                        <button id="editorResetBtn" class="btn btn-secondary btn-sm">初始局面</button>
                        <button id="editorClearBtn" class="btn btn-secondary btn-sm">清空</button>
                        <button id="editorStartBtn" class="btn btn-primary">开始对局</button>
                        <button id="editorCancelBtn" class="btn btn-sm">返回</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- AI Difficulty Modal -->
        <div id="aiDifficultyModal" class="modal hidden">
            <div class="modal-content">
                <h2>选择难度</h2>
                <p class="ai-section-label">JavaScript AI (快速)</p>
                <div class="difficulty-grid">
                    <button id="aiEasyBtn" class="btn btn-secondary difficulty-btn">
                        <span class="diff-name">简单</span>
                        <span class="diff-info">深度 4 | 2秒</span>
                    </button>
                    <button id="aiMediumBtn" class="btn btn-primary difficulty-btn">
                        <span class="diff-name">中等</span>
                        <span class="diff-info">深度 5 | 5秒</span>
                    </button>
                    <button id="aiHardBtn" class="btn btn-danger difficulty-btn">
                        <span class="diff-name">困难</span>
                        <span class="diff-info">深度 6 | 10秒</span>
                    </button>
                    <button id="aiExtremeBtn" class="btn btn-extreme difficulty-btn">
                        <span class="diff-name">极限</span>
                        <span class="diff-info">深度 8 | 20秒</span>
                    </button>
                </div>
                <p class="ai-section-label" id="pikafishLabel">Pikafish 引擎 (更强)</p>
                <div class="difficulty-grid" id="pikafishGrid">
                    <button id="pikafishEasyBtn" class="btn btn-pikafish difficulty-btn">
                        <span class="diff-name">简单</span>
                        <span class="diff-info">深度 8</span>
                    </button>
                    <button id="pikafishMediumBtn" class="btn btn-pikafish difficulty-btn">
                        <span class="diff-name">中等</span>
                        <span class="diff-info">深度 12</span>
                    </button>
                    <button id="pikafishHardBtn" class="btn btn-pikafish difficulty-btn">
                        <span class="diff-name">困难</span>
                        <span class="diff-info">深度 16</span>
                    </button>
                    <button id="pikafishExtremeBtn" class="btn btn-pikafish difficulty-btn">
                        <span class="diff-name">极限</span>
                        <span class="diff-info">深度 20</span>
                    </button>
                </div>
                <div class="fen-setup">
                    <p class="ai-section-label">自定义局面 (可选)</p>
                    <div class="fen-setup-row">
                        <input type="text" id="fenInput" placeholder="粘贴 FEN 字符串..." spellcheck="false">
                        <button id="clearFenBtn" class="btn btn-sm">清除</button>
                    </div>
                    <p id="fenError" class="fen-error hidden"></p>
                    <button id="openEditorBtn" class="btn btn-sm" style="margin-top: 8px; width: 100%;">可视化编辑局面</button>
                </div>
                <button id="cancelAIBtn" class="btn" style="margin-top: 15px;">取消</button>
            </div>
        </div>
    </div>

    <script src="/static/websocket.js?v=2"></script>
    <script src="/static/ai.js?v=2"></script>
    <script src="/static/pikafish-bridge.js?v=5"></script>
    <script src="/static/game.js?v=8"></script>
</body>
</html>
